<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="База знаний и инструкций ИТ-поддержки">
  <meta name="theme-color" content="#00AB16">
  <title>База знаний и инструкций</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/site.css?v=20260709-security">
  <script src="/assets/site-app.js?v=20260709-security" defer></script>
</head>
<body>
  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="icon-book" viewBox="0 0 24 24"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H7a3 3 0 0 0-3 3V5.5Z"/><path d="M4 19a3 3 0 0 1 3-3h13M8 7h8M8 11h8"/></symbol>
    <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>
    <symbol id="icon-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
    <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></symbol>
    <symbol id="icon-clear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6M15 9l-6 6"/></symbol>
    <symbol id="icon-all" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></symbol>
    <symbol id="icon-printer" viewBox="0 0 24 24"><path d="M6 9V3h12v6"/><rect x="6" y="14" width="12" height="7" rx="1"/><path d="M6 17H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><path d="M18 12h.01"/></symbol>
    <symbol id="icon-mail" viewBox="0 0 24 24"><rect x="2.5" y="4.5" width="19" height="15" rx="2"/><path d="m3.5 6 8.5 7 8.5-7"/></symbol>
    <symbol id="icon-key" viewBox="0 0 24 24"><circle cx="8" cy="15" r="5"/><path d="m11.5 11.5 8-8M16 7l2 2M18 5l2 2"/></symbol>
    <symbol id="icon-server" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="6" rx="2"/><rect x="3" y="14" width="18" height="6" rx="2"/><path d="M7 7h.01M7 17h.01"/></symbol>
    <symbol id="icon-users" viewBox="0 0 24 24"><circle cx="9" cy="8" r="4"/><path d="M2 21a7 7 0 0 1 14 0"/><path d="M17 11a4 4 0 0 0 0-6M22 21a7 7 0 0 0-5-6.7"/></symbol>
    <symbol id="icon-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-11V5l-8-3-8 3v6c0 7 8 11 8 11Z"/><path d="m9 12 2 2 4-4"/></symbol>
    <symbol id="icon-wifi" viewBox="0 0 24 24"><path d="M2.5 8.5a15 15 0 0 1 19 0M5.5 12a10 10 0 0 1 13 0M8.5 15.5a5 5 0 0 1 7 0"/><circle cx="12" cy="19" r="1"/></symbol>
    <symbol id="icon-video" viewBox="0 0 24 24"><rect x="2.5" y="5" width="14" height="14" rx="2"/><path d="m16.5 10 5-3v10l-5-3"/></symbol>
    <symbol id="icon-laptop" viewBox="0 0 24 24"><rect x="4" y="3.5" width="16" height="12" rx="2"/><path d="M2 19h20M9 19l1-3.5h4l1 3.5"/></symbol>
    <symbol id="icon-mouse" viewBox="0 0 24 24"><rect x="6" y="2" width="12" height="20" rx="6"/><path d="M12 2v7M6 10h12"/></symbol>
    <symbol id="icon-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h5l2 3h7a2 2 0 0 1 2 2v7.5A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5Z"/></symbol>
    <symbol id="icon-alert" viewBox="0 0 24 24"><path d="M12 3 2.5 20h19z"/><path d="M12 9v5M12 17.5h.01"/></symbol>
  </svg>

  <aside class="sidebar" id="sidebar" aria-label="Категории инструкций">
    <div class="sidebar-header">
      <a class="brand" href="/" aria-label="На главную">
        <img class="brand-logo" src="/assets/grass-logo.png" alt="">
      </a>
      <button class="icon-button mobile-only" id="close-sidebar-btn" type="button" aria-label="Закрыть меню">
        <svg aria-hidden="true"><use href="#icon-close"></use></svg>
      </button>
    </div>

    <div class="sidebar-scroll">
      <div class="sidebar-label">Категории</div>
      <nav class="category-nav" id="category-nav" aria-label="Разделы базы знаний">
        <div class="nav-skeleton"></div>
        <div class="nav-skeleton"></div>
        <div class="nav-skeleton"></div>
      </nav>
    </div>

    <div class="sidebar-footer">
      <span>v 1.0.0</span>
      <span>База знаний</span>
    </div>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <button class="icon-button mobile-only" id="mobile-menu-btn" type="button" aria-label="Открыть меню">
        <svg aria-hidden="true"><use href="#icon-menu"></use></svg>
      </button>

      <form class="search-form" id="search-form" role="search">
        <svg class="search-icon" aria-hidden="true"><use href="#icon-search"></use></svg>
        <label class="sr-only" for="search-input">Поиск по названию инструкции</label>
        <input id="search-input" type="search" autocomplete="off" maxlength="200" placeholder="Поиск по названию инструкции...">
        <button class="clear-search" id="clear-search-btn" type="button" aria-label="Очистить поиск" hidden>
          <svg aria-hidden="true"><use href="#icon-clear"></use></svg>
        </button>
      </form>

    </header>

    <section class="content-shell" aria-labelledby="current-category-title">
      <div class="content-heading">
        <div>
          <h1 id="current-category-title">Все инструкции</h1>
          <p id="results-count">Загрузка данных...</p>
        </div>
      </div>

      <div class="instruction-list" id="instructions-container" aria-live="polite" aria-busy="true">
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
      </div>

      <nav class="pagination" id="pagination" aria-label="Листание инструкций" hidden></nav>

      <div class="empty-state" id="empty-state" hidden>
        <span class="empty-icon"><svg aria-hidden="true"><use href="#icon-folder"></use></svg></span>
        <h2>Инструкции не найдены</h2>
        <p>Попробуйте изменить запрос или выбрать другой раздел.</p>
        <button class="secondary-button" id="reset-filters-btn" type="button">Сбросить фильтры</button>
      </div>
    </section>
  </main>

  <div class="mobile-overlay" id="mobile-overlay" hidden></div>
  <div class="image-viewer" id="image-viewer" role="dialog" aria-modal="true" aria-label="Просмотр скриншота" hidden>
    <button class="image-viewer-backdrop" id="image-viewer-backdrop" type="button" aria-label="Закрыть просмотр"></button>
    <div class="image-viewer-panel">
      <button class="image-viewer-close" id="image-viewer-close" type="button" aria-label="Закрыть просмотр">
        <svg aria-hidden="true"><use href="#icon-close"></use></svg>
      </button>
      <img id="image-viewer-img" alt="">
      <p id="image-viewer-caption"></p>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
