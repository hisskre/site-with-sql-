name: instructions-portal

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
      INSTR_API_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - instructions_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/00-init-db.sh:/docker-entrypoint-initdb.d/00-init-db.sh:ro
      - ./init_db.sql:/docker-entrypoint-initdb.d/sql/init_db.sql:ro
      - ./seed_instructions.sql:/docker-entrypoint-initdb.d/sql/seed_instructions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instructions_db"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build: .
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: instructions_db
      DB_USER: instr-api-user
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      API_CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      DB_POOL_MIN_SIZE: 1
      DB_POOL_MAX_SIZE: 10
      DB_POOL_TIMEOUT: 5
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  instructions_pgdata:
